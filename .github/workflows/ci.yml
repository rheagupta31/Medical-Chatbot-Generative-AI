name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Dummy values so Settings() validates; tests mock the RAG chain and make
  # no network calls.
  PINECONE_API_KEY: ci-dummy
  OPENAI_API_KEY: ci-dummy
  GOOGLE_API_KEY: ci-dummy

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: python -m pytest tests/ -q
